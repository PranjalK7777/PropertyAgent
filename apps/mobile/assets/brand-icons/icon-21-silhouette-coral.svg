  <!-- Body -->
  <rect x="272" y="536" width="480" height="340" rx="20" fill="white"/>
  <!-- Door punch -->
  <rect x="424" y="672" width="176" height="204" rx="88" fill="url(#g)"/>
  <!-- Accent: top-left circle -->
  <circle cx="220" cy="220" r="72" fill="white" opacity="0.18"/>
  <circle cx="220" cy="220" r="38" fill="white" opacity="0.30"/>
  <!-- Accent: bottom-right -->
