      <stop offset="0%" stop-color="#b85c38"/>
      <stop offset="100%" stop-color="#8f3d20"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#g)"/>
  <!-- Abstract-10 style: bold white house silhouette, door punched, accent circles -->
